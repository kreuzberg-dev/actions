name: Smoke Test CLI Binary
description: Tests standalone CLI binary extraction and basic functionality

inputs:
  cli-artifacts-dir:
    description: Directory containing CLI binary artifacts (archives)
    required: true
  binary-name:
    description: Name of the CLI binary (without extension)
    required: true
  archive-pattern-linux:
    description: Glob pattern for the Linux archive filename
    required: false
    default: "cli-x86_64-unknown-linux-gnu.tar.gz"
  archive-pattern-macos:
    description: Glob pattern for the macOS archive filename
    required: false
    default: "cli-aarch64-apple-darwin.tar.gz"
  archive-pattern-windows:
    description: Glob pattern for the Windows archive filename
    required: false
    default: "cli-x86_64-pc-windows-msvc.zip"
  test-input:
    description: Input to pipe to the CLI binary via stdin
    required: false
    default: "<h1>CLI Test</h1><p>Testing CLI binary</p>"
  expected-output:
    description: Substring expected in the CLI output
    required: false
    default: "# CLI Test"

runs:
  using: composite
  steps:
    - name: Smoke CLI binary
      shell: bash
      run: |
        set -euo pipefail
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          cli_archive=$(find "${{ inputs.cli-artifacts-dir }}" -name "${{ inputs.archive-pattern-windows }}" | head -n 1)
          if [ -z "$cli_archive" ]; then
            echo "CLI binary not found for Windows" >&2
            exit 1
          fi
          tmp=$(mktemp -d)
          unzip -q "$cli_archive" -d "$tmp"
          cli_bin=$(find "$tmp" -name "${{ inputs.binary-name }}.exe" | head -n 1)
        elif [[ "$RUNNER_OS" == "macOS" ]]; then
          cli_archive=$(find "${{ inputs.cli-artifacts-dir }}" -name "${{ inputs.archive-pattern-macos }}" | head -n 1)
          if [ -z "$cli_archive" ]; then
            echo "CLI binary not found for macOS" >&2
            exit 1
          fi
          tmp=$(mktemp -d)
          tar -xzf "$cli_archive" -C "$tmp"
          cli_bin=$(find "$tmp" -name "${{ inputs.binary-name }}" -type f | head -n 1)
        else
          cli_archive=$(find "${{ inputs.cli-artifacts-dir }}" -name "${{ inputs.archive-pattern-linux }}" | head -n 1)
          if [ -z "$cli_archive" ]; then
            echo "CLI binary not found for Linux" >&2
            exit 1
          fi
          tmp=$(mktemp -d)
          tar -xzf "$cli_archive" -C "$tmp"
          cli_bin=$(find "$tmp" -name "${{ inputs.binary-name }}" -type f | head -n 1)
        fi

        if [ ! -f "$cli_bin" ]; then
          echo "ERROR: CLI binary extraction failed" >&2
          exit 1
        fi

        chmod +x "$cli_bin" || true
        output=$(echo "${{ inputs.test-input }}" | "$cli_bin")

        if ! echo "$output" | grep -q "${{ inputs.expected-output }}"; then
          echo "ERROR: CLI did not produce expected output" >&2
          echo "Output: $output" >&2
          exit 1
        fi

        echo "CLI binary smoke test passed"
