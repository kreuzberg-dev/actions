name: Smoke Test C# Bindings
description: Tests C# P/Invoke bindings with FFI library

inputs:
  ffi-crate-name:
    description: Name of the Rust FFI crate to build
    required: true
  smoke-dir:
    description: Path to the smoke test directory (relative to repo root)
    required: false
    default: "examples/csharp-smoke"

runs:
  using: composite
  steps:
    - name: Build FFI library
      shell: bash
      run: |
        set -euo pipefail
        cargo build --release -p "${{ inputs.ffi-crate-name }}"

    - name: Smoke C# install (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set -euo pipefail
        lib_path="${GITHUB_WORKSPACE}/target/release"

        if [[ "${{ runner.os }}" == "Linux" ]]; then
          export LD_LIBRARY_PATH="$lib_path:${LD_LIBRARY_PATH:-}"
        elif [[ "${{ runner.os }}" == "macOS" ]]; then
          export DYLD_LIBRARY_PATH="$lib_path:${DYLD_LIBRARY_PATH:-}"
        fi

        pushd "${{ inputs.smoke-dir }}" >/dev/null
        dotnet run
        popd >/dev/null
        echo "C# P/Invoke bindings smoke test passed"

    - name: Smoke C# install (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        set -euo pipefail
        lib_path="${GITHUB_WORKSPACE}/target/release"

        export PATH="$lib_path:$PATH"

        pushd "${{ inputs.smoke-dir }}" >/dev/null
        dotnet run
        popd >/dev/null
        echo "C# P/Invoke bindings smoke test passed"
