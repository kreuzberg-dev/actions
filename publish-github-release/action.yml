name: Publish GitHub Release
description: >
  Create or update a GitHub release with artifact uploads.
  Ensures a release exists for the given tag with auto-generated notes.

inputs:
  tag:
    description: "Git tag for the release"
    required: true
  title:
    description: "Release title (defaults to tag name)"
    required: false
    default: ""
  artifacts:
    description: "Glob pattern or newline-separated list of files to upload"
    required: false
    default: ""
  generate-notes:
    description: "Auto-generate release notes"
    required: false
    default: "true"
  draft:
    description: "Create as draft release"
    required: false
    default: "false"
  prerelease:
    description: "Mark as pre-release"
    required: false
    default: "false"
  dry-run:
    description: "Perform a dry run without creating the release"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Create or update GitHub release
      shell: bash
      env:
        GH_TOKEN: ${{ env.GH_TOKEN || env.GITHUB_TOKEN }}
        INPUT_TAG: ${{ inputs.tag }}
        INPUT_TITLE: ${{ inputs.title }}
        INPUT_GENERATE_NOTES: ${{ inputs.generate-notes }}
        INPUT_DRAFT: ${{ inputs.draft }}
        INPUT_PRERELEASE: ${{ inputs.prerelease }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
      run: "${{ github.action_path }}/scripts/ensure-release.sh"

    - name: Upload release artifacts
      if: inputs.artifacts != '' && inputs.dry-run != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ env.GH_TOKEN || env.GITHUB_TOKEN }}
        INPUT_TAG: ${{ inputs.tag }}
        INPUT_ARTIFACTS: ${{ inputs.artifacts }}
      run: "${{ github.action_path }}/scripts/upload-artifacts.sh"
