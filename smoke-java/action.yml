name: Smoke Test Java Bindings
description: Tests Java JAR installation and functionality

inputs:
  jar-path:
    description: Path to the JAR file (optional, uses local maven install if not provided)
    required: false
    default: ""
  smoke-dir:
    description: Path to the smoke test directory (relative to repo root)
    required: false
    default: "examples/java_smoke"
  ffi-crate-name:
    description: Name of the Rust FFI crate to build
    required: true
  local-java-package-dir:
    description: Path to the local Java package directory for mvn install
    required: false
    default: "packages/java"
  group-id:
    description: Maven groupId for the JAR
    required: true
  artifact-id:
    description: Maven artifactId for the JAR
    required: true
  main-class:
    description: Fully qualified Java main class to execute
    required: true

runs:
  using: composite
  steps:
    - name: Smoke Java install
      shell: bash
      run: |
        set -euo pipefail
        tmp=$(mktemp -d)
        cp -R "${{ inputs.smoke-dir }}/." "$tmp"/
        pushd "$tmp" >/dev/null

        if [[ -n "${{ inputs.jar-path }}" ]]; then
          version="$(
            python3 - <<'PY'
        import os
        import xml.etree.ElementTree as ET
        from pathlib import Path

        pom = Path(os.environ["GITHUB_WORKSPACE"]) / os.environ["SMOKE_DIR"] / "pom.xml"
        ns = {"m": "http://maven.apache.org/POM/4.0.0"}

        tree = ET.parse(pom)
        group_id = os.environ["GROUP_ID"]
        artifact_id = os.environ["ARTIFACT_ID"]
        version = None
        for dep in tree.findall(".//m:dependency", ns):
            gid = dep.find("m:groupId", ns)
            aid = dep.find("m:artifactId", ns)
            ver = dep.find("m:version", ns)
            if gid is not None and aid is not None and gid.text and aid.text:
                if gid.text.strip() == group_id and aid.text.strip() == artifact_id:
                    version = (ver.text if ver is not None else "").strip()
                    break

        if not version:
            raise SystemExit(f"Unable to determine {artifact_id} version from {pom}")

        print(version)
        PY
          )"

          mvn install:install-file \
            -Dfile="${{ inputs.jar-path }}" \
            -DgroupId="${{ inputs.group-id }}" \
            -DartifactId="${{ inputs.artifact-id }}" \
            -Dversion="$version" \
            -Dpackaging=jar \
            -DgeneratePom=true

          pushd "${GITHUB_WORKSPACE}" >/dev/null
          cargo build -p "${{ inputs.ffi-crate-name }}" --release
          popd >/dev/null
        else
          pushd "${GITHUB_WORKSPACE}/${{ inputs.local-java-package-dir }}" >/dev/null
          mvn install -DskipTests -Dgpg.skip=true
          popd >/dev/null
        fi

        lib_dir="${GITHUB_WORKSPACE}/target/release"

        extra_java_flags="--enable-preview --enable-native-access=ALL-UNNAMED -Djava.library.path=${lib_dir}"
        if [[ -n "${JAVA_TOOL_OPTIONS:-}" ]]; then
          export JAVA_TOOL_OPTIONS="${JAVA_TOOL_OPTIONS} ${extra_java_flags}"
        else
          export JAVA_TOOL_OPTIONS="${extra_java_flags}"
        fi

        mvn -f pom.xml compile exec:java -Dexec.mainClass="${{ inputs.main-class }}"
        popd >/dev/null
        echo "Java JAR smoke test passed"
      env:
        SMOKE_DIR: ${{ inputs.smoke-dir }}
        GROUP_ID: ${{ inputs.group-id }}
        ARTIFACT_ID: ${{ inputs.artifact-id }}
