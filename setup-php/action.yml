name: Setup PHP
description: Install PHP with Composer
inputs:
  php-version:
    description: PHP version to install
    required: false
    default: "8.4"
  coverage:
    description: Coverage driver (none, xdebug, pcov)
    required: false
    default: "none"
  extensions:
    description: Comma-separated PHP extensions to install
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php-version }}
        coverage: ${{ inputs.coverage }}
        extensions: ${{ inputs.extensions }}
