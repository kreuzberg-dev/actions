$schema: https://raw.githubusercontent.com/Goldziher/ai-rulez/main/schema/ai-rules-v3.schema.json
version: "3.0"
name: actions
description: Shared GitHub Actions composite actions for kreuzberg-dev CI/CD pipelines
gitignore: true

includes:
  - name: kreuzberg-cicd
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/cicd
    merge_strategy: local-override

builtins:
  - security
  - git-workflow
  - code-quality
  - token-efficiency
  - default-commands

presets:
  - claude
  - codex
  - copilot
  - cursor
  - antigravity
