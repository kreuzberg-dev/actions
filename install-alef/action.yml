name: Install Alef
description: Install the Alef polyglot binding generator CLI
inputs:
  version:
    description: >
      Alef version to install. Use a semver tag (e.g. "0.7.1"), "latest" for the
      most recent published release, or "main" to build from the main branch.
    required: false
    default: "latest"
runs:
  using: composite
  steps:
    - name: Install Alef (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        "${{ github.action_path }}/scripts/unix.sh" "${{ inputs.version }}"

    - name: Install Alef (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        & '${{ github.action_path }}/scripts/windows.ps1' '${{ inputs.version }}'
