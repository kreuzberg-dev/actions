name: Test setup-maven
on:
  push:
    paths:
      - "setup-maven/**"
      - ".github/workflows/test-setup-maven.yml"
  pull_request:
    paths:
      - "setup-maven/**"
      - ".github/workflows/test-setup-maven.yml"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25.0.2+10"

      - name: Setup Maven
        uses: ./setup-maven

      - name: Verify installation
        shell: bash
        run: mvn --version
