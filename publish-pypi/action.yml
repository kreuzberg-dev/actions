name: Publish to PyPI
description: >
  Publish Python packages to PyPI using OIDC trusted publishing.
  Wraps pypa/gh-action-pypi-publish with consistent defaults.

inputs:
  packages-dir:
    description: "Directory containing distribution files to upload"
    required: false
    default: "dist"
  skip-existing:
    description: "Skip packages that already exist on PyPI"
    required: false
    default: "true"
  repository-url:
    description: "PyPI repository URL (use https://test.pypi.org/legacy/ for testing)"
    required: false
    default: ""
  dry-run:
    description: "Perform a dry run without actually publishing"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: List packages to publish
      shell: bash
      env:
        PACKAGES_DIR: ${{ inputs.packages-dir }}
      run: |
        echo "Packages in ${PACKAGES_DIR}:"
        ls -lh "${PACKAGES_DIR}"/ 2>/dev/null || echo "No packages found"

    - name: Publish to PyPI
      if: inputs.dry-run != 'true'
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: ${{ inputs.packages-dir }}
        skip-existing: ${{ inputs.skip-existing }}

    - name: Dry run summary
      if: inputs.dry-run == 'true'
      shell: bash
      env:
        PACKAGES_DIR: ${{ inputs.packages-dir }}
      run: |
        echo "[dry-run] Would publish packages from ${PACKAGES_DIR}"
        echo "Files that would be uploaded:"
        ls "${PACKAGES_DIR}"/*.whl "${PACKAGES_DIR}"/*.tar.gz 2>/dev/null || echo "  (none found)"
