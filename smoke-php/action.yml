name: Smoke Test PHP Extension
description: Tests PHP extension installation and functionality (Linux and Windows)

inputs:
  extension-path:
    description: Path to the PHP extension file (.so on Linux, .dll on Windows)
    required: true
  smoke-dir:
    description: Path to the smoke test directory (relative to repo root)
    required: false
    default: "examples/php-smoke"
  local-package-dir:
    description: Path to the local PHP Composer package directory (relative to repo root)
    required: false
    default: "packages/php"
  entry-script:
    description: PHP script to run in the smoke directory
    required: false
    default: "convert.php"

runs:
  using: composite
  steps:
    - name: Smoke PHP install (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      env:
        COMPOSER_ALLOW_SUPERUSER: 1
      run: |
        set -euo pipefail
        tmp=$(mktemp -d)
        cp -R "${{ inputs.smoke-dir }}/." "$tmp"/
        pushd "$tmp" >/dev/null
        composer_bin=$(command -v composer)
        php -d "extension=${{ inputs.extension-path }}" "$composer_bin" config repositories.local path "${GITHUB_WORKSPACE}/${{ inputs.local-package-dir }}" --no-plugins
        php -d "extension=${{ inputs.extension-path }}" "$composer_bin" config repositories.local.options.symlink false --no-plugins
        php -d "extension=${{ inputs.extension-path }}" "$composer_bin" install --no-interaction --no-progress --no-scripts
        php -d "extension=${{ inputs.extension-path }}" "${{ inputs.entry-script }}"
        popd >/dev/null
        echo "PHP extension smoke test passed"

    - name: Smoke PHP install (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $tmp = Join-Path $env:RUNNER_TEMP "php-smoke-windows"
        if (Test-Path $tmp) { Remove-Item $tmp -Recurse -Force }
        New-Item -ItemType Directory -Path $tmp -Force | Out-Null
        Copy-Item -Path "$env:GITHUB_WORKSPACE/${{ inputs.smoke-dir }}/*" -Destination $tmp -Recurse -Force
        Set-Location $tmp
        $workspace = $env:GITHUB_WORKSPACE -replace '\\','/'
        composer config repositories.local path "$workspace/${{ inputs.local-package-dir }}" --no-plugins
        composer config repositories.local.options.symlink false --no-plugins
        composer install --no-interaction --no-progress --no-scripts
        php -n -d "extension=${{ inputs.extension-path }}" "${{ inputs.entry-script }}"
        Write-Host "PHP extension smoke test passed"
