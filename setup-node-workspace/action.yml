name: Setup Node.js Workspace
description: Configure Node.js with pnpm and workspace dependencies
inputs:
  node-version:
    description: Node.js version to install
    required: false
    default: "24"
  frozen-lockfile:
    description: Use frozen lockfile for pnpm install
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: |
        if [ "${{ inputs.frozen-lockfile }}" = "true" ]; then
          pnpm install --frozen-lockfile
        else
          pnpm install
        fi

    - name: Add pnpm bin to PATH
      shell: bash
      run: echo "$(pnpm bin)" >> "$GITHUB_PATH"
